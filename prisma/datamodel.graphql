type User {
  id: ID! @unique @id
  name: String!
  email: String! @unique
  password: String!
  updatedAt: DateTime! @updatedAt
  createdAt: DateTime! @createdAt
}

type Customer {
  id: ID! @unique @id
  info: User! @relation(name: "CustomerToUser", onDelete: CASCADE)
  phone: String
  address: String!
  requests: [Request!]! @relation(name: "RequestToCustomer", onDelete: CASCADE)
}

type Driver {
  id: ID! @unique @id
  info: User! @relation(name: "DriverToUser", onDelete: CASCADE)
  phone: String
  acceptedRequests: [Request!]! @relation(name: "RequestToDriver", onDelete: CASCADE)
}

type Item {
  id: ID! @unique @id
  name: String!
  request: Request @relation(name: "ItemToRequest", onDelete: SET_NULL)
}

type CostRange {
  id: ID! @unique @id
  from: Float!
  to: Float!
  request: Request @relation(name: "RequestToCostRange", onDelete: SET_NULL, link: TABLE)
}

type Request {
  id: ID! @unique @id
  description: String
  items: [Item!]! @relation(name: "ItemToRequest", onDelete: CASCADE)
  date: String!
  schedule: String!
  costRange: CostRange! @relation(name: "RequestToCostRange", onDelete: CASCADE)
  deliveryAddress: String!
  status: String!
  owner: Customer! @relation(name: "RequestToCustomer", onDelete: SET_NULL)
  driver: Driver @relation(name: "RequestToDriver", onDelete: SET_NULL)
}

