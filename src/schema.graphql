# import UserOrderByInput from './generated/prisma.graphql'

type Query {
    users(query: String, first: Int, skip: Int, after: String, orderBy: UserOrderByInput): [User!]!
    me: User!
}

type Mutation {
    createUser(data: CreateUserInput!): AuthPayload!
    login(data: LoginUserInput!): AuthPayload!
    deleteUser: User!
    updateUser(data: UpdateUserInput!): User!
}

type AuthPayload {
    token: String!
    user: User!
}

input CreateUserInput {
    name: String!
    email: String!
    password: String!
}

input LoginUserInput {
    email: String!
    password: String!
}

input UpdateUserInput {
    name: String
    email: String
    password: String
}

type User {
    id: ID!
    name: String!
    email: String
    password: String!
    updatedAt: String!
    createdAt: String!
}

type Customer {
  id: ID!
  info: User!
  phone: String
  address: String!
  requests: [Request]
}

type Driver {
  id: ID!
  info: User!
  phone: String
  acceptedRequests: [Request]
}

type Request {
  id: ID!
  description: String
  items: [String!]!
  date: String!
  schedule: String!
  costRange:[Int!]!
  deliveryAddress: String!
  status: String!
  owner: Customer!
  driver: Driver
}

enum MutationType {
    CREATED
    UPDATED
    DELETED
}

enum RequestStatus {
  CREATED
  ONHOLD
  ASSIGNED
  DELIVERED
}

enum RequestSchedule {
    ASAP
    TODAY
    THISWEEK
}